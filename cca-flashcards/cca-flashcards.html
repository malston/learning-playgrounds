<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCA Foundations Exam Flashcards</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ================================================
       CSS Custom Properties
       ================================================ */
    :root {
      --bg-page: #faf3e0;
      --bg-card: #fdf8ef;
      --border-card: #d4b896;
      --text-primary: #2c1810;
      --text-secondary: #6b5344;
      --accent: #c17817;
      --accent-hover: #a86510;
      --success: #5a7a4a;
      --error: #a04040;
      --diff-easy: #5a7a4a;
      --diff-medium: #c17817;
      --diff-hard: #a04040;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Lora', 'Times New Roman', serif;
      --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
      --shadow-card: 0 2px 8px rgba(44, 24, 16, 0.12);
      --shadow-card-hover: 0 6px 20px rgba(44, 24, 16, 0.18);
      --shadow-active: 0 8px 32px rgba(44, 24, 16, 0.2);
    }

    /* ================================================
       Reset & Base
       ================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      color: var(--text-primary);
      background-color: var(--bg-page);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Parchment noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-display);
      font-weight: 700;
      line-height: 1.3;
    }

    /* ================================================
       App Header
       ================================================ */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border-card);
      background-color: var(--bg-card);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .app-header h1 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--text-primary);
    }

    .app-header-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    /* ================================================
       Home Grid
       ================================================ */
    .home-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      padding: 2rem 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    @media (min-width: 640px) {
      .home-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .home-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* ================================================
       Category Card
       ================================================ */
    .category-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: var(--shadow-card);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      transform: rotate(var(--rotation, 0deg));
      position: relative;
    }

    .category-card:hover {
      transform: rotate(var(--rotation, 0deg)) translateY(-4px);
      box-shadow: var(--shadow-card-hover);
    }

    .category-card:active {
      transform: rotate(var(--rotation, 0deg)) translateY(-2px);
      box-shadow: var(--shadow-card);
    }

    .category-card-all {
      border-style: dashed;
      border-width: 2px;
      background-color: rgba(193, 120, 23, 0.04);
    }

    .category-card h3 {
      font-family: var(--font-display);
      font-size: 1.15rem;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .category-card p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
    }

    /* ================================================
       Progress Bar
       ================================================ */
    .progress-bar {
      width: 100%;
      height: 4px;
      background-color: rgba(44, 24, 16, 0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 0.75rem;
    }

    .progress-bar-fill {
      height: 100%;
      background-color: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* ================================================
       Weight Badge
       ================================================ */
    .weight-badge {
      display: inline-block;
      background-color: rgba(193, 120, 23, 0.15);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      line-height: 1.4;
    }

    /* ================================================
       Card Container (3D Flip Wrapper)
       ================================================ */
    .card-container {
      perspective: 1000px;
      max-width: 600px;
      width: 100%;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    /* ================================================
       Flip Card
       ================================================ */
    .card {
      position: relative;
      width: 100%;
      min-height: 320px;
      transform-style: preserve-3d;
      transition: transform 400ms cubic-bezier(0.4, 0.0, 0.2, 1), box-shadow 0.2s ease;
      cursor: pointer;
    }

    .card:hover {
      box-shadow: 0 10px 36px rgba(193, 120, 23, 0.15);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    /* ================================================
       Card Face (shared front/back)
       ================================================ */
    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: 1px solid var(--border-card);
      border-radius: 10px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-active);
      overflow-y: auto;
    }

    /* ================================================
       Card Front
       ================================================ */
    .card-front {
      background-color: var(--bg-card);
    }

    .card-front h2 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .card-front p {
      font-family: var(--font-body);
      font-size: 1.05rem;
      color: var(--text-primary);
      line-height: 1.7;
      flex: 1;
    }

    /* ================================================
       Card Back
       ================================================ */
    .card-back {
      background-color: #f9f2e4;
      transform: rotateY(180deg);
      background-image: repeating-linear-gradient(
        transparent,
        transparent 27px,
        rgba(44, 24, 16, 0.06) 27px,
        rgba(44, 24, 16, 0.06) 28px
      );
    }

    .card-back p {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--text-primary);
      line-height: 1.7;
      flex: 1;
    }

    .card-refs {
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px dashed rgba(44, 24, 16, 0.15);
    }

    .card-refs-heading {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 0.4rem;
      opacity: 0.8;
    }

    .card-refs-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .card-refs-list li {
      font-family: var(--font-body);
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.5;
      padding: 0.15rem 0;
    }

    .card-refs-list li .ref-icon {
      margin-right: 0.3rem;
      font-size: 0.72rem;
    }

    .card-refs-list li .ref-path {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-secondary);
      opacity: 0.6;
      display: block;
      margin-left: 1.2rem;
      margin-top: -0.1rem;
    }

    /* ================================================
       Difficulty Badge
       ================================================ */
    .difficulty-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 500;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      line-height: 1.4;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .difficulty-badge::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: currentColor;
    }

    .difficulty-badge.easy {
      color: var(--diff-easy);
      background-color: rgba(90, 122, 74, 0.12);
    }

    .difficulty-badge.medium {
      color: var(--diff-medium);
      background-color: rgba(193, 120, 23, 0.12);
    }

    .difficulty-badge.hard {
      color: var(--diff-hard);
      background-color: rgba(160, 64, 64, 0.12);
    }

    /* ================================================
       Study Nav (bottom bar)
       ================================================ */
    .study-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 600px;
      width: 100%;
      margin: 1rem auto 2rem;
      padding: 0.75rem 1rem;
      gap: 0.75rem;
    }

    .study-nav-position {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .study-nav-category {
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-style: italic;
      text-align: center;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ================================================
       Quiz Options
       ================================================ */
    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-width: 600px;
      width: 100%;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }

    .quiz-option {
      display: block;
      width: 100%;
      text-align: left;
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.5;
      padding: 0.9rem 1.25rem;
      background-color: var(--bg-card);
      border: 2px solid var(--border-card);
      border-radius: 8px;
      color: var(--text-primary);
      cursor: pointer;
      transition: border-color 0.15s ease, background-color 0.15s ease, transform 0.1s ease;
      min-height: 44px;
    }

    .quiz-option:hover {
      border-color: var(--accent);
      background-color: rgba(193, 120, 23, 0.04);
      transform: translateX(4px);
    }

    .quiz-option:active {
      transform: translateX(2px);
    }

    .quiz-option.correct {
      border-color: var(--success);
      background-color: rgba(90, 122, 74, 0.1);
      color: var(--success);
    }

    .quiz-option.incorrect {
      border-color: var(--error);
      background-color: rgba(160, 64, 64, 0.08);
      color: var(--error);
    }

    .quiz-option.revealed {
      border-color: var(--success);
      outline: 2px solid var(--success);
      outline-offset: -2px;
      background-color: rgba(90, 122, 74, 0.06);
    }

    .quiz-option[disabled] {
      cursor: default;
      transform: none;
    }

    .quiz-option[disabled]:hover {
      transform: none;
    }

    /* ================================================
       Quiz Score
       ================================================ */
    .quiz-score {
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--text-secondary);
      text-align: center;
      padding: 0.5rem 1rem;
    }

    .quiz-score strong {
      color: var(--text-primary);
      font-weight: 500;
    }

    /* ================================================
       Quiz Summary
       ================================================ */
    .quiz-summary {
      max-width: 600px;
      width: 100%;
      margin: 2rem auto;
      padding: 2rem;
      background-color: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 10px;
      box-shadow: var(--shadow-card);
      text-align: center;
    }

    .quiz-summary h2 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .quiz-summary .score-display {
      font-family: var(--font-mono);
      font-size: 2.5rem;
      font-weight: 500;
      color: var(--accent);
      margin: 1rem 0;
    }

    .quiz-summary .score-percentage {
      font-family: var(--font-body);
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }

    .quiz-summary .missed-list {
      text-align: left;
      margin-top: 1.5rem;
      border-top: 1px solid var(--border-card);
      padding-top: 1.5rem;
    }

    .quiz-summary .missed-list h3 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      margin-bottom: 0.75rem;
      color: var(--text-primary);
    }

    .quiz-summary .missed-item {
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(44, 24, 16, 0.06);
    }

    .quiz-summary .missed-item:last-child {
      border-bottom: none;
    }

    .quiz-summary .missed-question {
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .quiz-summary .missed-answer {
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--success);
      font-style: italic;
    }

    /* ================================================
       Mode Toggle (Study / Quiz)
       ================================================ */
    .mode-toggle {
      display: inline-flex;
      align-items: center;
      background-color: rgba(44, 24, 16, 0.06);
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
    }

    .mode-toggle-option {
      font-family: var(--font-body);
      font-size: 0.85rem;
      padding: 0.4rem 1rem;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease;
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    .mode-toggle-option.active {
      background-color: var(--bg-card);
      color: var(--text-primary);
      box-shadow: 0 1px 4px rgba(44, 24, 16, 0.1);
      font-weight: 700;
    }

    .mode-toggle-option:hover:not(.active) {
      color: var(--text-primary);
    }

    /* ================================================
       Buttons
       ================================================ */
    .btn {
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 700;
      padding: 0.6rem 1.25rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.1s ease;
      background-color: var(--accent);
      color: #fff;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .btn:hover {
      background-color: var(--accent-hover);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-card);
    }

    .btn-secondary:hover {
      background-color: rgba(44, 24, 16, 0.04);
      color: var(--text-primary);
    }

    /* ================================================
       Code & Mono
       ================================================ */
    code, .mono {
      font-family: var(--font-mono);
      font-size: 0.9em;
      background-color: rgba(44, 24, 16, 0.05);
      padding: 0.15em 0.35em;
      border-radius: 3px;
    }

    /* ================================================
       Focus Outlines (keyboard navigation)
       ================================================ */
    .category-card:focus-visible,
    .card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ================================================
       View Transitions
       ================================================ */
    .view-enter {
      animation: viewFadeIn 200ms ease-out;
    }

    @keyframes viewFadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ================================================
       Responsive
       ================================================ */
    @media (max-width: 640px) {
      body {
        font-size: 16px;
      }

      .app-header {
        padding: 0.75rem 1rem;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .app-header h1 {
        font-size: 1.2rem;
      }

      .home-grid {
        padding: 1.25rem 1rem;
        gap: 1rem;
      }

      .category-card {
        padding: 1.25rem;
      }

      .card-container {
        margin: 1.5rem auto;
        padding: 0 0.75rem;
      }

      .card {
        min-height: 280px;
      }

      .card-face {
        padding: 1.5rem;
      }

      .card-front h2 {
        font-size: 1.15rem;
      }

      .study-nav {
        padding: 0.5rem 0.75rem;
        margin: 0.75rem auto 1.5rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .study-nav-category {
        flex-basis: 100%;
        text-align: center;
      }

      .quiz-options {
        padding: 0 0.75rem;
      }

      .quiz-summary {
        margin: 1.5rem auto;
        padding: 1.5rem;
      }

      .quiz-summary .score-display {
        font-size: 2rem;
      }
    }

    /* ================================================
       Print
       ================================================ */
    @media print {
      body::before {
        display: none;
      }

      .app-header,
      .study-nav,
      .mode-toggle,
      .btn,
      .btn-secondary {
        display: none;
      }

      .card-container {
        perspective: none;
        margin: 0;
        padding: 0;
        max-width: 100%;
      }

      .card {
        transform: none !important;
        transform-style: flat;
        min-height: auto;
      }

      .card-face {
        position: static;
        backface-visibility: visible;
        -webkit-backface-visibility: visible;
        box-shadow: none;
        border: 1px solid #ccc;
        padding: 1rem;
        margin-bottom: 1rem;
      }

      .card-back {
        transform: none;
      }

      .quiz-options {
        margin: 0;
        padding: 0;
      }

      .quiz-option {
        border: 1px solid #ccc;
        box-shadow: none;
      }
    }
  </style>
</head>

        front: "Why does placing critical information in the middle of a long context window cause problems?",
        back: "Due to the 'lost in the middle' effect, language models pay more attention to information at the beginning and end of their context. Critical information in the middle receives less attention, causing the model to miss important details or make decisions without considering key constraints. The fix: place critical information at the beginning or end of context to ensure it is properly weighted in reasoning.",

        refs: ["api-course", "api-notes"]

        category: "terminology",
        front: "What is Context Forking?",
        back: "Splitting context into separate branches for different subagents. Each subagent gets only the context relevant to its specific task, rather than the full conversation history. This keeps context focused and prevents irrelevant information from diluting attention.",
        difficulty: 1,
        refs: ["subagents-course"]
      },

        category: "terminology",
        front: "What is the Coordinator-Subagent Pattern?",

        id: "sq-010",
        category: "sample-questions",
        front: "Scenario 1 Practice: A support agent has 12 tools including customer lookup, refund processing, shipping tracking, inventory management, HR policy queries, and marketing campaign access. The agent occasionally selects the wrong tool.\n\nA) Improve tool descriptions to make each tool more clearly distinguishable\nB) Add a tool selection validation step asking Claude to confirm its choice before executing\nC) Reduce the agent's tool set to 4-5 focused customer support tools and move remaining capabilities to specialized subagents\nD) Increase the model's context window to give more space for tool evaluation",
        back: "Correct Answer: C. This addresses both problems: reducing to 4-5 tools restores selection accuracy AND moving HR/marketing to subagents eliminates scope creep and applies least privilege. Option A is a trap: improving descriptions helps with a well-scoped tool set but does not fix the fundamental 12-tool selection degradation or the security risk of the agent having access to HR and marketing data. Option B adds latency and cost. Option D does not improve tool selection -- larger context may make deliberation worse.",
        difficulty: 3,
        refs: ["api-course", "subagents-course", "cca-scenario1", "repo-tool-use"]
      },
    ];

    // ================================================
    // useLocalStorage hook
    // ================================================
    function useLocalStorage(key, initialValue) {
      const [storedValue, setStoredValue] = React.useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {
          return initialValue;
        }
      });
      const setValue = (value) => {
        const valueToStore = value instanceof Function ? value(storedValue) : value;
        setStoredValue(valueToStore);
        window.localStorage.setItem(key, JSON.stringify(valueToStore));
      };
      return [storedValue, setValue];
    }

    // ================================================
    // renderCardText helper
    // ================================================
    function renderCardText(text) {
      const parts = text.split('`');
      return parts.map((part, i) =>
        i % 2 === 1
          ? React.createElement('code', { key: i }, part)
          : part
      );
    }

    // ================================================
    // generateQuizOptions utility
    // ================================================
    function generateQuizOptions(card, allCards) {
      const sameCategory = allCards.filter(c => c.category === card.category && c.id !== card.id);
      const pool = sameCategory.length >= 3 ? sameCategory : allCards.filter(c => c.id !== card.id);
      const shuffled = [...pool].sort(() => Math.random() - 0.5);
      const distractors = shuffled.slice(0, 3);
      const extractOption = (text) => {
        const firstSentence = text.split(/\.\s/)[0];
        return firstSentence.length > 150 ? firstSentence.substring(0, 147) + '...' : firstSentence + '.';
      };
      const options = [
        { text: extractOption(card.back), isCorrect: true, cardId: card.id },
        ...distractors.map(d => ({ text: extractOption(d.back), isCorrect: false, cardId: d.id }))
      ];
      return options.sort(() => Math.random() - 0.5);
    }

    // ================================================
    // Card component
    // ================================================
    function Card({ card, isFlipped, onFlip }) {
      const difficultyLabel = card.difficulty === 1 ? 'easy'
        : card.difficulty === 2 ? 'medium' : 'hard';
      const categoryObj = CATEGORIES.find(c => c.key === card.category);
      const categoryName = categoryObj ? categoryObj.name : card.category;

      return (
        <div className="card-container">
          <div
            className={`card${isFlipped ? ' flipped' : ''}`}
            onClick={onFlip}
            role="button"
            tabIndex="0"
            aria-label={isFlipped ? 'Showing answer. Click or press Space to flip back.' : 'Showing question. Click or press Space to reveal answer.'}
            onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onFlip(); } }}
          >
            <div className="card-face card-front">
              <span className={`difficulty-badge ${difficultyLabel}`}>
                {difficultyLabel}
              </span>
              <p style={{ marginTop: '1rem' }}>{renderCardText(card.front)}</p>
              <p style={{ marginTop: 'auto', paddingTop: '1rem', fontSize: '0.8rem', color: 'var(--text-secondary)', fontStyle: 'italic' }}>
                {categoryName}
              </p>
            </div>
            <div className="card-face card-back">
              <p>{renderCardText(card.back)}</p>
              {card.refs && card.refs.length > 0 && (
                <div className="card-refs" onClick={(e) => e.stopPropagation()}>
                  <div className="card-refs-heading">{'\u{1F4DA}'} Study Materials</div>
                  <ul className="card-refs-list">
                    {card.refs.map((refKey) => {
                      const ref = TRAINING_REFS[refKey];
                      if (!ref) return null;
                      const icon = ref.completed ? '\u2705'
                        : ref.path.includes('exercises/') || ref.path.endsWith('.ipynb') ? '\u{1F4D3}'
                        : '\u{1F4D6}';
                      return (
                        <li key={refKey}>
                          <span className="ref-icon">{icon}</span>
                          {ref.url
                            ? <a href={ref.url} target="_blank" rel="noopener noreferrer"
                                style={{ color: 'var(--text-secondary)', textDecoration: 'underline', textUnderlineOffset: '2px' }}>
                                {ref.name}{ref.completed ? ' (completed)' : ''}
                              </a>
                            : <span>{ref.name}</span>
                          }
                          <span className="ref-path">{ref.path}</span>
                        </li>
                      );
                    })}
                  </ul>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ================================================
    // StudyMode component
    // ================================================
    function StudyMode({ cards, category, progress, onMarkSeen, onBack }) {
      const [currentIndex, setCurrentIndex] = React.useState(0);
      const [isFlipped, setIsFlipped] = React.useState(false);
      const [shuffled, setShuffled] = React.useState(false);
      const [deck, setDeck] = React.useState(cards);

      React.useEffect(() => {
        if (shuffled) {
          const copy = [...cards];
          for (let i = copy.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [copy[i], copy[j]] = [copy[j], copy[i]];
          }
          setDeck(copy);
        } else {
          setDeck(cards);
        }
        setCurrentIndex(0);
        setIsFlipped(false);
      }, [shuffled, cards]);

      const currentCard = deck[currentIndex];

      const handleFlip = React.useCallback(() => {
        setIsFlipped(prev => {
          if (!prev && currentCard) {
            onMarkSeen(currentCard.id);
          }
          return !prev;
        });
      }, [currentCard, onMarkSeen]);

      const goNext = React.useCallback(() => {
        if (currentIndex < deck.length - 1) {
          setCurrentIndex(i => i + 1);
          setIsFlipped(false);
        }
      }, [currentIndex, deck.length]);

      const goPrev = React.useCallback(() => {
        if (currentIndex > 0) {
          setCurrentIndex(i => i - 1);
          setIsFlipped(false);
        }
      }, [currentIndex]);

      const toggleShuffle = React.useCallback(() => {
        setShuffled(s => !s);
      }, []);

      React.useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'ArrowRight') goNext();
          else if (e.key === 'ArrowLeft') goPrev();
          else if (e.key === ' ') { e.preventDefault(); handleFlip(); }
          else if (e.key === 's' || e.key === 'S') toggleShuffle();
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [goNext, goPrev, handleFlip, toggleShuffle]);

      if (!currentCard) {
        return (
          <div className="view-enter" style={{ padding: '2rem', textAlign: 'center' }}>
            <h2>No cards in this category</h2>
            <button className="btn btn-secondary" onClick={onBack} style={{ marginTop: '1.5rem' }}>
              Back to Home
            </button>
          </div>
        );
      }

      return (
        <div className="view-enter">
          <Card card={currentCard} isFlipped={isFlipped} onFlip={handleFlip} />
          <div className="study-nav">
            <button
              className="btn btn-secondary"
              disabled={currentIndex === 0}
              onClick={goPrev}
            >
              Prev
            </button>
            <span className="study-nav-position">
              {currentIndex + 1} / {deck.length}
            </span>
            <button
              className="btn btn-secondary"
              disabled={currentIndex === deck.length - 1}
              onClick={goNext}
            >
              Next
            </button>
            <button
              className={`btn${shuffled ? '' : ' btn-secondary'}`}
              onClick={toggleShuffle}
            >
              Shuffle
            </button>
            <span className="study-nav-category">{category}</span>
          </div>
        </div>
      );
    }

    // ================================================
    // ProgressBar component
    // ================================================
    function ProgressBar({ current, total, color }) {
      const percentage = total > 0 ? Math.round((current / total) * 100) : 0;
      const fillColor = color || 'var(--accent)';
      return (
        <div className="progress-bar">
          <div
            className="progress-bar-fill"
            style={{ width: `${percentage}%`, backgroundColor: fillColor }}
          />
        </div>
      );
    }

    // ================================================
    // QuizSummary component
    // ================================================
    function QuizSummary({ answers, cards, score, total, categoryName, onRestart, onHome }) {
      const percentage = Math.round((score / total) * 100);
      const scoreColor = percentage >= 72 ? 'var(--success)' : percentage >= 50 ? 'var(--accent)' : 'var(--error)';
      const missed = answers.filter(a => !a.isCorrect);

      return (
        <div className="quiz-summary view-enter">
          <h2>Quiz Complete</h2>
          <div className="score-display" style={{ color: scoreColor }}>
            {score} / {total}
          </div>
          <div className="score-percentage">
            {percentage}% -- {categoryName}
          </div>
          <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)', marginBottom: '1rem' }}>
            CCA passing score is 720/1000 (72%)
          </p>
          <div style={{ display: 'flex', gap: '0.75rem', justifyContent: 'center', marginTop: '1rem' }}>
            <button className="btn" onClick={onRestart}>Try Again</button>
            <button className="btn btn-secondary" onClick={onHome}>Back to Home</button>
          </div>
          {missed.length > 0 && (
            <div className="missed-list">
              <h3>Missed Questions ({missed.length})</h3>
              {missed.map((m, i) => {
                const card = cards.find(c => c.id === m.cardId);
                return (
                  <div key={i} className="missed-item">
                    <div className="missed-question">{card ? renderCardText(card.front) : m.cardId}</div>
                    <div className="missed-answer">
                      Correct: {card ? renderCardText(card.back.split(/\.\s/)[0] + '.') : ''}
                    </div>
                    {m.selected && (
                      <div style={{ fontSize: '0.85rem', color: 'var(--error)', fontStyle: 'italic', marginTop: '0.15rem' }}>
                        You chose: {m.selected}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // ================================================
    // QuizMode component
    // ================================================
    function QuizMode({ cards, allCards, category, onComplete, onBack }) {
      const [currentIndex, setCurrentIndex] = React.useState(0);
      const [score, setScore] = React.useState(0);
      const [answers, setAnswers] = React.useState([]);
      const [showResult, setShowResult] = React.useState(false);
      const [selectedIndex, setSelectedIndex] = React.useState(null);
      const [finished, setFinished] = React.useState(false);
      const [shuffleSeed, setShuffleSeed] = React.useState(0);

      const deck = React.useMemo(() => {
        const copy = [...cards];
        for (let i = copy.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }, [cards, shuffleSeed]);

      const currentCard = deck[currentIndex];

      const options = React.useMemo(() => {
        if (!currentCard) return [];
        return generateQuizOptions(currentCard, allCards);
      }, [currentCard, allCards]);

      const handleSelect = React.useCallback((index) => {
        if (showResult) return;
        setSelectedIndex(index);
        setShowResult(true);
        const option = options[index];
        const isCorrect = option.isCorrect;
        if (isCorrect) setScore(s => s + 1);
        setAnswers(prev => [...prev, {
          cardId: currentCard.id,
          selected: option.text,
          isCorrect
        }]);
      }, [showResult, options, currentCard]);

      const handleNext = React.useCallback(() => {
        if (!showResult) return;
        if (currentIndex < deck.length - 1) {
          setCurrentIndex(i => i + 1);
          setShowResult(false);
          setSelectedIndex(null);
        } else {
          const finalScore = score;
          const total = deck.length;
          onComplete(finalScore, total);
          setFinished(true);
        }
      }, [showResult, currentIndex, deck.length, score, onComplete]);

      const handleRestart = React.useCallback(() => {
        setCurrentIndex(0);
        setScore(0);
        setAnswers([]);
        setShowResult(false);
        setSelectedIndex(null);
        setFinished(false);
        setShuffleSeed(s => s + 1);
      }, []);

      React.useEffect(() => {
        const handleKeyDown = (e) => {
          if (finished) return;
          if (e.key >= '1' && e.key <= '4' && !showResult) {
            handleSelect(parseInt(e.key, 10) - 1);
          } else if (e.key === 'Enter' && showResult) {
            handleNext();
          } else if (e.key === 'Escape') {
            onBack();
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [finished, showResult, handleSelect, handleNext, onBack]);

      if (finished) {
        return (
          <QuizSummary
            answers={answers}
            cards={deck}
            score={score}
            total={deck.length}
            categoryName={category}
            onRestart={handleRestart}
            onHome={onBack}
          />
        );
      }

      if (!currentCard) {
        return (
          <div className="view-enter" style={{ padding: '2rem', textAlign: 'center' }}>
            <h2>No cards in this category</h2>
            <button className="btn btn-secondary" onClick={onBack} style={{ marginTop: '1.5rem' }}>
              Back to Home
            </button>
          </div>
        );
      }

      return (
        <div className="view-enter">
          <div className="quiz-score">
            <strong>{score}</strong> / {currentIndex + (showResult ? 1 : 0)} correct
          </div>
          <ProgressBar current={currentIndex + 1} total={deck.length} />
          <div className="card-container">
            <div style={{
              backgroundColor: 'var(--bg-card)',
              border: '1px solid var(--border-card)',
              borderRadius: '10px',
              padding: '2rem',
              boxShadow: 'var(--shadow-active)'
            }}>
              <span className={`difficulty-badge ${currentCard.difficulty === 1 ? 'easy' : currentCard.difficulty === 2 ? 'medium' : 'hard'}`}>
                {currentCard.difficulty === 1 ? 'easy' : currentCard.difficulty === 2 ? 'medium' : 'hard'}
              </span>
              <p style={{ marginTop: '1rem', fontSize: '1.05rem', lineHeight: '1.7' }}>
                {renderCardText(currentCard.front)}
              </p>
            </div>
          </div>
          <div className="quiz-options">
            {options.map((opt, i) => {
              let className = 'quiz-option';
              if (showResult) {
                if (opt.isCorrect) {
                  className += selectedIndex === i ? ' correct' : ' revealed';
                } else if (selectedIndex === i) {
                  className += ' incorrect';
                }
              }
              return (
                <button
                  key={i}
                  className={className}
                  disabled={showResult}
                  onClick={() => handleSelect(i)}
                >
                  <span style={{ fontFamily: 'var(--font-mono)', marginRight: '0.75rem', opacity: 0.5 }}>{i + 1}.</span>
                  {opt.text}
                </button>
              );
            })}
          </div>
          {showResult && (
            <div style={{ maxWidth: '600px', margin: '1rem auto', padding: '0 1rem' }}>
              <div style={{
                backgroundColor: 'rgba(193, 120, 23, 0.06)',
                border: '1px solid var(--border-card)',
                borderRadius: '8px',
                padding: '1.25rem',
                fontSize: '0.95rem',
                lineHeight: '1.7'
              }}>
                {renderCardText(currentCard.back)}
              </div>
              <div style={{ textAlign: 'center', marginTop: '1rem' }}>
                <button className="btn" onClick={handleNext}>
                  {currentIndex < deck.length - 1 ? 'Next' : 'See Results'}
                </button>
                <span style={{ marginLeft: '0.75rem', fontSize: '0.8rem', color: 'var(--text-secondary)' }}>
                  or press Enter
                </span>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ================================================
    // HomeScreen component
    // ================================================
    function HomeScreen({ categories, cards, progress, scores, mode, onSelectCategory }) {
      const totalCards = cards.length;
      const totalSeen = React.useMemo(() => {
        const allSeen = new Set();
        Object.values(progress).forEach(ids => ids.forEach(id => allSeen.add(id)));
        return allSeen.size;
      }, [progress]);

      const rotations = React.useMemo(() => {
        const rots = {};
        categories.forEach(cat => {
          rots[cat.key] = `${((Math.random() - 0.5) * 3).toFixed(2)}deg`;
        });
        rots['all'] = `${((Math.random() - 0.5) * 3).toFixed(2)}deg`;
        return rots;
      }, []);

      const allScores = React.useMemo(() => {
        let totalBest = 0;
        let totalAttempts = 0;
        Object.values(scores).forEach(s => {
          if (s.attempts > 0) {
            totalBest += s.best;
            totalAttempts += s.attempts;
          }
        });
        return { best: totalBest, attempts: totalAttempts };
      }, [scores]);

      return (
        <div className="view-enter">
          <div className="home-grid">
            {categories.map(cat => {
              const catCards = cards.filter(c => c.category === cat.key);
              const catCount = catCards.length;
              const seen = (progress[cat.key] || []).length;
              const catScore = scores[cat.key];
              return (
                <div
                  key={cat.key}
                  className="category-card"
                  style={{ '--rotation': rotations[cat.key] }}
                  onClick={() => onSelectCategory(cat.key)}
                  role="button"
                  tabIndex="0"
                  onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onSelectCategory(cat.key); } }}
                >
                  <h3>{cat.name}</h3>
                  <p>{catCount} card{catCount !== 1 ? 's' : ''}</p>
                  {cat.weight && (
                    <span className="weight-badge">Exam weight: {cat.weight}</span>
                  )}
                  <ProgressBar current={seen} total={catCount} color={cat.color} />
                  {catScore && catScore.attempts > 0 && (
                    <p style={{ marginTop: '0.5rem', fontSize: '0.8rem' }}>
                      Best: {catScore.best}% ({catScore.attempts} attempt{catScore.attempts !== 1 ? 's' : ''})
                    </p>
                  )}
                </div>
              );
            })}
            <div
              className="category-card category-card-all"
              style={{ '--rotation': rotations['all'] }}
              onClick={() => onSelectCategory('all')}
              role="button"
              tabIndex="0"
              onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onSelectCategory('all'); } }}
            >
              <h3>All Cards</h3>
              <p>{totalCards} card{totalCards !== 1 ? 's' : ''}</p>
              <ProgressBar current={totalSeen} total={totalCards} />
              {allScores.attempts > 0 && (
                <p style={{ marginTop: '0.5rem', fontSize: '0.8rem' }}>
                  Best avg: {Math.round(allScores.best / allScores.attempts)}%
                </p>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ================================================
    // App component
    // ================================================
    function App() {
      const [view, setView] = React.useState('home');
      const [activeCategory, setActiveCategory] = React.useState('all');
      const [mode, setMode] = useLocalStorage('cca-mode', 'study');
      const [progress, setProgress] = useLocalStorage('cca-progress', {});
      const [scores, setScores] = useLocalStorage('cca-scores', {});

      const handleSelectCategory = React.useCallback((categoryKey) => {
        setActiveCategory(categoryKey);
        setView(mode);
      }, [mode]);

      const handleGoHome = React.useCallback(() => {
        setView('home');
      }, []);

      const handleModeToggle = React.useCallback((newMode) => {
        setMode(newMode);
        if (view !== 'home') {
          setView(newMode);
        }
      }, [view]);

      // Global keyboard listener
      React.useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'Escape' && view !== 'home') {
            handleGoHome();
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [view, handleGoHome]);

      const activeCards = React.useMemo(() => {
        if (activeCategory === 'all') return CARD_DATA;
        return CARD_DATA.filter(c => c.category === activeCategory);
      }, [activeCategory]);

      const activeCategoryName = React.useMemo(() => {
        if (activeCategory === 'all') return 'All Cards';
        const cat = CATEGORIES.find(c => c.key === activeCategory);
        return cat ? cat.name : activeCategory;
      }, [activeCategory]);

      return (
        <div>
          <header className="app-header">
            <h1>CCA Flashcards</h1>
            <div className="app-header-controls">
              {view !== 'home' && (
                <button className="btn btn-secondary" onClick={handleGoHome}>
                  Home
                </button>
              )}
              <div className="mode-toggle">
                <button
                  className={`mode-toggle-option${mode === 'study' ? ' active' : ''}`}
                  onClick={() => handleModeToggle('study')}
                >
                  Study
                </button>
                <button
                  className={`mode-toggle-option${mode === 'quiz' ? ' active' : ''}`}
                  onClick={() => handleModeToggle('quiz')}
                >
                  Quiz
                </button>
              </div>
            </div>
          </header>

          {view === 'home' && (
            <HomeScreen
              categories={CATEGORIES}
              cards={CARD_DATA}
              progress={progress}
              scores={scores}
              mode={mode}
              onSelectCategory={handleSelectCategory}
            />
          )}

          {view === 'study' && (
            <StudyMode
              cards={activeCards}
              category={activeCategoryName}
              progress={progress}
              onMarkSeen={(cardId) => {
                setProgress(prev => {
                  const card = CARD_DATA.find(c => c.id === cardId);
                  if (!card) return prev;
                  const catKey = card.category;
                  const existing = prev[catKey] || [];
                  if (existing.includes(cardId)) return prev;
                  return { ...prev, [catKey]: [...existing, cardId] };
                });
              }}
              onBack={handleGoHome}
            />
          )}

          {view === 'quiz' && (
            <QuizMode
              cards={activeCards}
              allCards={CARD_DATA}
              category={activeCategoryName}
              onComplete={(finalScore, total) => {
                const percentage = Math.round((finalScore / total) * 100);
                const key = activeCategory;
                setScores(prev => {
                  const existing = prev[key] || { best: 0, last: 0, attempts: 0 };
                  return {
                    ...prev,
                    [key]: {
                      best: Math.max(existing.best, percentage),
                      last: percentage,
                      attempts: (existing.attempts || 0) + 1
                    }
                  };
                });
              }}
              onBack={handleGoHome}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
