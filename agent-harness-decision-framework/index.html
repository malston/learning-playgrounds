<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Harness Decision Framework</title>
<style>
  :root {
    --bg: #0c0f14;
    --bg-card: #141820;
    --bg-hover: #1a1f2a;
    --bg-active: #1e2536;
    --border: #2a3040;
    --text: #c8cdd8;
    --text-dim: #6b7280;
    --text-bright: #e8ecf4;
    --cyan: #22d3ee;
    --cyan-dim: #0e7490;
    --blue: #3b82f6;
    --blue-dim: #1e40af;
    --green: #22c55e;
    --green-dim: #166534;
    --amber: #f59e0b;
    --amber-dim: #92400e;
    --red: #ef4444;
    --red-dim: #991b1b;
    --purple: #a78bfa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }

  header {
    padding: 20px 24px 0;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 20px;
    color: var(--text-bright);
    font-weight: 600;
    margin-bottom: 4px;
  }
  header p {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .tabs {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 16px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: inherit;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--cyan);
    border-bottom-color: var(--cyan);
  }

  main {
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
    padding-bottom: 120px;
  }
  .section { display: none; }
  .section.active { display: block; }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 16px;
    color: var(--text-bright);
    margin-bottom: 4px;
  }
  .card h3 {
    font-size: 14px;
    color: var(--text-bright);
    margin-bottom: 8px;
  }
  .card .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  @media (max-width: 900px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    text-align: left;
    padding: 8px 12px;
    color: var(--text-dim);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }

  .switch {
    position: relative;
    width: 40px;
    height: 22px;
    flex-shrink: 0;
    display: inline-block;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .switch .slider::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    left: 3px;
    top: 3px;
    background: var(--text);
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .switch input:checked + .slider { background: var(--cyan); }
  .switch input:checked + .slider::before { transform: translateX(18px); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-amber { background: var(--amber-dim); color: var(--amber); }
  .badge-red { background: var(--red-dim); color: var(--red); }
  .badge-blue { background: var(--blue-dim); color: var(--blue); }

  .arch-diagram {
    min-height: 280px;
    position: relative;
    overflow: hidden;
  }
  .arch-node {
    position: absolute;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    z-index: 2;
    background: var(--bg-card);
  }
  .arch-node:hover {
    border-color: var(--cyan);
    background: var(--bg-active);
    z-index: 3;
  }
  .arch-node.selected {
    border-color: var(--cyan);
    box-shadow: 0 0 12px rgba(34, 211, 238, 0.2);
  }
  .arch-svg {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .node-detail {
    background: var(--bg-active);
    border: 1px solid var(--cyan-dim);
    border-radius: 8px;
    padding: 16px;
    margin-top: 12px;
    font-size: 13px;
    display: none;
  }
  .node-detail.visible { display: block; }
  .node-detail h4 {
    color: var(--cyan);
    margin-bottom: 8px;
    font-size: 14px;
  }
  .flow-item {
    display: flex;
    gap: 8px;
    margin: 4px 0;
    font-size: 12px;
  }
  .flow-item .arrow { color: var(--cyan); flex-shrink: 0; }

  .wizard-step {
    display: none;
    animation: fadeIn 0.3s;
  }
  .wizard-step.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .wizard-option {
    display: block;
    width: 100%;
    padding: 14px 18px;
    margin: 8px 0;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .wizard-option:hover {
    border-color: var(--cyan-dim);
    background: var(--bg-hover);
  }
  .wizard-option.selected {
    border-color: var(--cyan);
    background: var(--bg-active);
  }
  .wizard-option .opt-desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .wizard-progress {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .wizard-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }
  .wizard-dot.done { background: var(--cyan); }
  .wizard-dot.current {
    background: var(--cyan);
    box-shadow: 0 0 8px rgba(34,211,238,0.4);
  }

  .wizard-result {
    display: none;
    animation: fadeIn 0.3s;
  }
  .wizard-result.active { display: block; }

  .elim-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    font-size: 13px;
  }
  .elim-row.eliminated { text-decoration: line-through; color: var(--text-dim); }
  .elim-icon { width: 20px; text-align: center; }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: var(--border);
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--cyan);
    cursor: pointer;
    box-shadow: 0 0 6px rgba(34,211,238,0.3);
  }

  .slot {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .slot h4 {
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .slot-options { display: flex; flex-wrap: wrap; gap: 8px; }
  .slot-opt {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    background: none;
    color: var(--text);
    font-family: inherit;
  }
  .slot-opt:hover { border-color: var(--cyan-dim); }
  .slot-opt.selected { border-color: var(--cyan); background: rgba(34,211,238,0.1); color: var(--cyan); }

  .conflict-msg {
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(245,158,11,0.1);
    border: 1px solid var(--amber-dim);
    border-radius: 6px;
    font-size: 12px;
    color: var(--amber);
    display: none;
  }
  .conflict-msg.visible { display: block; }

  .timeline-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 40px 0;
    position: relative;
  }
  .timeline-marker {
    position: absolute;
    top: -32px;
    transform: translateX(-50%);
    text-align: center;
    font-size: 11px;
  }
  .timeline-marker .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin: 4px auto 0;
  }

  .venn-container {
    position: relative;
    height: 220px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .venn-circle {
    position: absolute;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 2px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    text-align: center;
    padding: 20px;
  }

  #prompt-output-container {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    z-index: 100;
  }
  .prompt-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    cursor: pointer;
  }
  .prompt-header span {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .prompt-body {
    padding: 0 24px 14px;
    max-height: 200px;
    overflow-y: auto;
  }
  #prompt-text {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
  }
  .copy-btn {
    padding: 6px 14px;
    background: var(--cyan-dim);
    color: var(--cyan);
    border: none;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .copy-btn:hover { background: var(--cyan); color: var(--bg); }
  .copy-btn.copied { background: var(--green); color: white; }

  .chevron {
    display: inline-block;
    transition: transform 0.2s;
    color: var(--text-dim);
    font-size: 14px;
  }
  .chevron.up { transform: rotate(180deg); }

  .tip {
    position: relative;
    cursor: help;
    border-bottom: 1px dotted var(--text-dim);
  }
  .tip .tip-text {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-active);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text);
    white-space: normal;
    width: 250px;
    z-index: 50;
    pointer-events: none;
    font-weight: 400;
  }
  .tip:hover .tip-text { display: block; }

  .insight {
    background: rgba(34,211,238,0.06);
    border-left: 3px solid var(--cyan-dim);
    padding: 12px 16px;
    margin: 16px 0;
    font-size: 13px;
    color: var(--text);
  }
  .insight strong { color: var(--cyan); }

  .category-legend {
    display: flex;
    gap: 16px;
    margin: 12px 0;
    font-size: 12px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .reset-btn {
    padding: 6px 14px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .reset-btn:hover { border-color: var(--text-dim); color: var(--text); }

  .presets {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .preset-btn {
    padding: 5px 12px;
    background: var(--bg-hover);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .preset-btn:hover { border-color: var(--cyan-dim); color: var(--text); }
  .preset-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(34,211,238,0.08); }

  .gap-expand {
    display: none;
    padding: 12px 16px;
    background: var(--bg-hover);
    border-top: 1px solid var(--border);
    font-size: 12px;
  }
  .gap-expand.visible { display: block; }

  .clickable-row { cursor: pointer; }
  .clickable-row:hover { background: var(--bg-hover); }
</style>
</head>
<body>

<header>
  <h1>Agent Harness Decision Framework</h1>
  <p>Should you adopt a third-party framework, build on native capabilities, or compose a hybrid?</p>
  <div class="tabs" id="tabs" role="tablist" aria-label="Framework analysis sections"></div>
</header>

<main id="main-content"></main>

<div id="prompt-output-container">
  <div class="prompt-header" id="prompt-toggle" role="button" tabindex="0" aria-expanded="true" aria-label="Toggle prompt output">
    <span>Prompt Output <span class="chevron" id="prompt-chevron">&#9650;</span></span>
    <button class="copy-btn" id="copy-btn">Copy</button>
  </div>
  <div class="prompt-body" id="prompt-body">
    <div id="prompt-text">Explore the tabs above. Your selections will generate a contextual prompt here.</div>
  </div>
</div>

<script>
// ===== STATE =====
const state = {
  activeTab: 'ablation',
  ablation: {
    sprintDecomp: true, contextResets: true, detailedSpecs: true,
    sprintContract: true, evaluator: true, planner: true
  },
  wizard: { step: 0, answers: {}, complete: false },
  obsolescence: 30,
  hybrid: { planner: null, generator: null, evaluator: null, methodology: null, orchestration: null },
  promptCollapsed: false
};

// ===== DATA =====
const ablationComponents = [
  { key: 'sprintDecomp', name: 'Sprint Decomposition', desc: 'Breaking work into small task batches',
    opus: ['None', 'model maintained coherence'], opusImpact: 'green',
    sonnet: ['Significant', 'lost coherence on long tasks'], sonnetImpact: 'red' },
  { key: 'contextResets', name: 'Context Resets', desc: 'Clearing context between phases',
    opus: ['None', 'no context anxiety observed'], opusImpact: 'green',
    sonnet: ['Significant', 'premature task completion'], sonnetImpact: 'red' },
  { key: 'detailedSpecs', name: 'Detailed Task Specs', desc: 'Micro-level step-by-step instructions',
    opus: ['Negative', 'micro-specs caused cascading errors'], opusImpact: 'green',
    sonnet: ['Positive', 'model needed guidance'], sonnetImpact: 'red' },
  { key: 'sprintContract', name: 'Sprint Contract', desc: 'Generator/evaluator negotiate "done"',
    opus: ['Minimal', 'generator handled quality solo'], opusImpact: 'green',
    sonnet: ['Moderate', 'evaluator had to catch gaps'], sonnetImpact: 'amber' },
  { key: 'evaluator', name: 'Evaluator Agent', desc: 'Grades output quality with rubrics',
    opus: ['Significant', 'critical for subjective tasks'], opusImpact: 'red',
    sonnet: ['Significant', 'needed across all tasks'], sonnetImpact: 'red' },
  { key: 'planner', name: 'Planner Agent', desc: 'Scopes work at a high level',
    opus: ['Significant', 'generators under-scoped'], opusImpact: 'red',
    sonnet: ['Significant', 'same impact'], sonnetImpact: 'red' },
];

const archData = {
  bmad: {
    color: 'var(--red)', label: 'BMAD', sublabel: 'Documentation-First',
    nodes: [
      { id: 'analyst', label: 'Analyst', x: 100, y: 20,
        detail: 'Gathers requirements and produces a PRD.', dataIn: 'User requirements, existing docs', dataOut: 'PRD (Product Requirements Document)', comm: 'File-based: writes PRD.md' },
      { id: 'architect', label: 'Architect', x: 100, y: 75,
        detail: 'Designs system architecture from the PRD.', dataIn: 'PRD.md', dataOut: 'Architecture Document', comm: 'File-based: reads PRD, writes ARCHITECTURE.md' },
      { id: 'pm', label: 'PM', x: 100, y: 130,
        detail: 'Creates user stories and task breakdowns.', dataIn: 'PRD + Architecture docs', dataOut: 'User stories, task list', comm: 'File-based: reads upstream docs, writes stories' },
      { id: 'developer', label: 'Developer', x: 100, y: 185,
        detail: 'Implements code from the task list.', dataIn: 'Stories + task specs', dataOut: 'Source code', comm: 'File-based: reads tasks, writes code' },
      { id: 'qa', label: 'QA', x: 100, y: 240,
        detail: 'Reviews code from multiple angles.', dataIn: 'Source code + requirements', dataOut: 'Review feedback', comm: 'File-based: reads code, writes review' },
    ],
    edges: [[0,1],[1,2],[2,3],[3,4]]
  },
  gsd: {
    color: 'var(--amber)', label: 'GSD', sublabel: 'Spec-Driven',
    nodes: [
      { id: 'orch', label: 'Orchestrator', x: 110, y: 20,
        detail: 'Central dispatcher managing the 5-phase pipeline.', dataIn: 'User task description', dataOut: 'Phase activation signals', comm: 'File-based: CONTEXT.md, STATE.md' },
      { id: 'research', label: 'Researcher (4)', x: 40, y: 100,
        detail: '4 agents investigating the codebase and requirements.', dataIn: 'CONTEXT.md', dataOut: 'Research findings', comm: 'File-based: writes to shared context' },
      { id: 'planner', label: 'Planner + Checker', x: 170, y: 100,
        detail: 'Creates atomic execution plan in XML. Checker validates quality.', dataIn: 'Research findings', dataOut: 'PLAN.md (atomic tasks with deps)', comm: 'File-based: PLAN.md' },
      { id: 'executor', label: 'Parallel Executors', x: 110, y: 185,
        detail: 'Wave-based execution. Independent tasks run in parallel.', dataIn: 'PLAN.md tasks', dataOut: 'Implemented code', comm: 'File-based: STATE.md progress' },
      { id: 'verifier', label: 'Verifier', x: 110, y: 250,
        detail: 'Pass/fail verification against plan specifications.', dataIn: 'Code + plan specs', dataOut: 'Pass/fail result', comm: 'File-based: reads STATE.md' },
    ],
    edges: [[0,1],[0,2],[1,3],[2,3],[3,4]]
  },
  superpowers: {
    color: 'var(--green)', label: 'Superpowers', sublabel: 'Skills-Based',
    nodes: [
      { id: 'brainstorm', label: 'Brainstorm', x: 110, y: 20,
        detail: 'Socratic questioning to explore requirements.', dataIn: 'User request', dataOut: 'Clarified requirements', comm: 'Conversational (in-context)' },
      { id: 'plan', label: 'Plan (2-5 min)', x: 110, y: 95,
        detail: 'Breaks work into small testable tasks (2-5 min each).', dataIn: 'Clarified requirements', dataOut: 'Task plan', comm: 'Plan file' },
      { id: 'execute', label: 'Execute', x: 110, y: 170,
        detail: 'Dispatches subagents for independent tasks.', dataIn: 'Task plan', dataOut: 'Implemented code', comm: 'Subagent dispatch' },
      { id: 'tdd', label: 'TDD + Review', x: 110, y: 245,
        detail: 'Tests first. Fresh subagent reviews code independently.', dataIn: 'Implementation', dataOut: 'Tested, reviewed code', comm: 'Skill composition' },
    ],
    edges: [[0,1],[1,2],[2,3]]
  },
  native: {
    color: 'var(--cyan)', label: 'Anthropic Native', sublabel: 'Minimal Scaffolding',
    nodes: [
      { id: 'planner', label: 'Planner', x: 110, y: 30,
        detail: 'Scopes work at a high product-level. No micro-specifications.', dataIn: 'User spec or requirements', dataOut: 'High-level plan', comm: 'Agent teams (direct messaging)' },
      { id: 'generator', label: 'Generator', x: 50, y: 155,
        detail: 'Writes code. Can spawn subagents. Direct communication.', dataIn: 'Plan + codebase context', dataOut: 'Source code, tests', comm: 'Agent teams (direct messaging)' },
      { id: 'evaluator', label: 'Evaluator', x: 170, y: 155,
        detail: 'Scores output on multiple dimensions (1-10 per rubric).', dataIn: 'Generated code', dataOut: 'Graded scores + feedback', comm: 'Agent teams (direct messaging)' },
    ],
    edges: [[0,1],[1,2],[2,1]]
  }
};

const wizardQuestions = [
  {
    question: 'Are you Claude-only or multi-provider?',
    options: [
      { label: 'Claude-only', desc: 'Team uses Claude Code exclusively', key: 'claude' },
      { label: 'Multi-provider', desc: 'Team uses different AI coding assistants', key: 'multi' },
    ],
    eliminations: { claude: {}, multi: { native: 'Requires Claude. You need a provider-agnostic option.' } },
    boosts: { claude: ['native', 'superpowers'], multi: ['gsd', 'bmad'] }
  },
  {
    question: "What's your primary concern?",
    options: [
      { label: 'Building the wrong thing', desc: 'Vague requirements, wasted implementation', key: 'wrong' },
      { label: 'Building it sloppily', desc: 'Skipped tests, inconsistent quality', key: 'sloppy' },
      { label: 'Losing context', desc: 'Long or multi-session projects', key: 'context' },
      { label: 'Proving what was done', desc: 'Compliance, audits, team turnover', key: 'audit' },
    ],
    eliminations: { wrong: {}, sloppy: {}, context: {}, audit: {} },
    boosts: { wrong: ['bmad', 'native'], sloppy: ['superpowers'], context: ['gsd'], audit: ['bmad', 'gsd'] }

function initTabs() {
  const tabBar = document.getElementById('tabs');
  tabDefs.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'tab' + (t.id === state.activeTab ? ' active' : '');
    btn.textContent = t.label;
    btn.dataset.tab = t.id;
    btn.setAttribute('role', 'tab');
    btn.setAttribute('aria-selected', t.id === state.activeTab ? 'true' : 'false');
    btn.setAttribute('aria-controls', 'sec-' + t.id);
    btn.id = 'tab-' + t.id;
    if (t.id !== state.activeTab) btn.setAttribute('tabindex', '-1');
    btn.addEventListener('click', () => switchTab(t.id));
    tabBar.appendChild(btn);
  });

  tabBar.addEventListener('keydown', (e) => {
    const tabs = Array.from(tabBar.querySelectorAll('[role="tab"]'));
    const current = tabs.findIndex(t => t.dataset.tab === state.activeTab);
    let next = -1;
    if (e.key === 'ArrowRight') next = (current + 1) % tabs.length;
    else if (e.key === 'ArrowLeft') next = (current - 1 + tabs.length) % tabs.length;
    else if (e.key === 'Home') next = 0;
    else if (e.key === 'End') next = tabs.length - 1;
    if (next >= 0) {
      e.preventDefault();
      switchTab(tabs[next].dataset.tab);
      tabs[next].focus();
    }
  });
}

function switchTab(id) {
  state.activeTab = id;
  document.querySelectorAll('.tab').forEach(t => {
    const isActive = t.dataset.tab === id;
    t.classList.toggle('active', isActive);
    t.setAttribute('aria-selected', isActive ? 'true' : 'false');
    t.setAttribute('tabindex', isActive ? '0' : '-1');
  });
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + id));
  updatePrompt();
}

function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if (k === 'className') e.className = v;
    else e.setAttribute(k, v);
  });
  if (children) {
    if (typeof children === 'string') e.textContent = children;
    else if (Array.isArray(children)) children.forEach(c => { if (c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
    else e.appendChild(children);
  }
  return e;
}

function html(parent, markup) {
  const t = document.createElement('template');
  t.innerHTML = markup;
  const frag = t.content;
  parent.appendChild(frag);
}

  tbody.textContent = '';

  ablationComponents.forEach(c => {
    const on = state.ablation[c.key];
    const tr = document.createElement('tr');
    tr.style.transition = 'opacity 0.3s';
    tr.style.opacity = on ? '1' : '0.4';

    const tdSwitch = document.createElement('td');
    const sw = document.createElement('label');
    sw.className = 'switch';
    const inp = document.createElement('input');
    inp.type = 'checkbox';
    inp.checked = on;
    inp.setAttribute('aria-label', 'Toggle ' + c.name);
    inp.addEventListener('change', () => { state.ablation[c.key] = !state.ablation[c.key]; clearAblPresets(); renderAblation(); });
    const sl = document.createElement('span');
    sl.className = 'slider';
    sw.appendChild(inp);
    sw.appendChild(sl);
    tdSwitch.appendChild(sw);
    tr.appendChild(tdSwitch);

    const tdName = document.createElement('td');
    const nameSpan = document.createElement('span');
    nameSpan.style.fontWeight = '500';
    nameSpan.style.color = 'var(--text-bright)';
    nameSpan.textContent = c.name;
    tdName.appendChild(nameSpan);
    tdName.appendChild(document.createElement('br'));
    const descSpan = document.createElement('span');
    descSpan.style.fontSize = '11px';
    descSpan.style.color = 'var(--text-dim)';
    descSpan.textContent = c.desc;
    tdName.appendChild(descSpan);
    tr.appendChild(tdName);

    [['opus', 'opusImpact'], ['sonnet', 'sonnetImpact']].forEach(([model, impact]) => {
      const td = document.createElement('td');
      const badge = document.createElement('span');
      badge.className = 'badge badge-' + (on ? c[impact] : 'green');
      badge.textContent = on ? c[model][0] : 'Removed';
      td.appendChild(badge);
      if (on && c[model][1]) {
        td.appendChild(document.createElement('br'));
        const detail = document.createElement('span');
        detail.style.fontSize = '11px';
        detail.style.color = 'var(--text-dim)';
        detail.textContent = c[model][1];
        td.appendChild(detail);
      }
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  // Core viz
  const core = document.getElementById('abl-core');
  core.textContent = '';
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap';
  const generator = { name: 'Generator', essential: true };
  const active = ablationComponents.filter(c => state.ablation[c.key]);
  const all = [generator, ...active.map(c => ({ name: c.name, essential: ['evaluator','planner'].includes(c.key) }))];
  all.forEach(c => {
    const d = document.createElement('div');
    const clr = c.essential ? 'var(--cyan)' : 'var(--text-dim)';
    d.style.cssText = `padding:8px 14px;border:1px solid ${clr};border-radius:6px;font-size:12px;background:${c.essential ? 'rgba(34,211,238,0.1)' : 'var(--bg-hover)'};color:${clr}`;
    d.textContent = c.name;
    wrap.appendChild(d);
  });
  core.appendChild(wrap);

  document.getElementById('abl-count').textContent = active.length;

  const summary = document.getElementById('abl-summary');
  summary.textContent = '';
  const removed = ablationComponents.filter(c => !state.ablation[c.key]);
  if (removed.length === 0) {
    summary.textContent = 'All components active. Toggle off to see what Opus 4.6 handles alone.';
    summary.style.color = 'var(--text-dim)';
    summary.style.fontSize = '13px';
  } else {
    const safe = removed.filter(c => c.opusImpact === 'green');
    const risky = removed.filter(c => c.opusImpact === 'red');
    const d = document.createElement('div');
    d.style.fontSize = '13px';
    if (safe.length) { const p = document.createElement('div'); p.style.color = 'var(--green)'; p.style.marginBottom = '4px'; p.textContent = 'Safe to remove (' + safe.length + '): ' + safe.map(c=>c.name).join(', '); d.appendChild(p); }
    if (risky.length) { const p = document.createElement('div'); p.style.color = 'var(--red)'; p.textContent = 'Significant loss (' + risky.length + '): ' + risky.map(c=>c.name).join(', '); d.appendChild(p); }
    summary.appendChild(d);
  }
  updatePrompt();
}

function clearAblPresets() {
  document.querySelectorAll('#abl-presets .preset-btn').forEach(b => b.classList.remove('active'));
}

function initAblPresets() {
  const presets = document.getElementById('abl-presets');
  [['Full Harness','full'],['Minimal (P+G+E)','minimal'],['Bare Generator','bare']].forEach(([label,key]) => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (key === 'full' ? ' active' : '');
    btn.textContent = label;
    btn.addEventListener('click', () => {
      document.querySelectorAll('#abl-presets .preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (key === 'full') Object.keys(state.ablation).forEach(k => state.ablation[k] = true);
      else if (key === 'minimal') { state.ablation = { sprintDecomp:false, contextResets:false, detailedSpecs:false, sprintContract:false, evaluator:true, planner:true }; }
      else Object.keys(state.ablation).forEach(k => state.ablation[k] = false);
      renderAblation();
    });
    presets.appendChild(btn);
  });
}

// ===== WIZARD SCORING (shared by tracker, result, and prompt) =====
const FW_NAMES = { bmad:'BMAD', gsd:'GSD', superpowers:'Superpowers', native:'Anthropic Native' };
const FW_COLORS = { bmad:'var(--red)', gsd:'var(--amber)', superpowers:'var(--green)', native:'var(--cyan)' };

function computeWizardScores() {
  const eliminated = {};
  const scores = { bmad: 0, gsd: 0, superpowers: 0, native: 0 };
  Object.entries(state.wizard.answers).forEach(([i, key]) => {
    const q = wizardQuestions[i];
    if (q.eliminations[key]) {
      Object.entries(q.eliminations[key]).forEach(([fw, reason]) => {
        if (!eliminated[fw]) eliminated[fw] = [];
        eliminated[fw].push({ q: Number(i) + 1, reason });
      });
    }
    if (q.boosts && q.boosts[key]) q.boosts[key].forEach(fw => scores[fw] += 2);
  });
  Object.keys(eliminated).forEach(fw => delete scores[fw]);
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  return { eliminated, scores, sorted };
}

// ===== WIZARD RENDERER =====
function renderWizard() {
  const steps = document.getElementById('wiz-steps');
  const progress = document.getElementById('wiz-progress');
  steps.textContent = '';
  progress.textContent = '';

  wizardQuestions.forEach((q, i) => {
    const dot = document.createElement('div');
    dot.className = 'wizard-dot';
    if (i < state.wizard.step) dot.classList.add('done');
    if (i === state.wizard.step && !state.wizard.complete) dot.classList.add('current');
    if (state.wizard.complete) dot.classList.add('done');
    progress.appendChild(dot);

    const step = document.createElement('div');
    step.className = 'wizard-step' + (i === state.wizard.step && !state.wizard.complete ? ' active' : '');
    const h = document.createElement('h3');
    h.style.cssText = 'margin-bottom:12px;font-size:15px';
    h.textContent = 'Q' + (i+1) + ': ' + q.question;
    step.appendChild(h);
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'wizard-option' + (state.wizard.answers[i] === opt.key ? ' selected' : '');
      const lbl = document.createTextNode(opt.label);
      btn.appendChild(lbl);
      const desc = document.createElement('div');
      desc.className = 'opt-desc';
      desc.textContent = opt.desc;
      btn.appendChild(desc);
      btn.addEventListener('click', () => {
        state.wizard.answers[i] = opt.key;
        if (i < wizardQuestions.length - 1) state.wizard.step = i + 1;
        else state.wizard.complete = true;
        renderWizard();
        updatePrompt();
      });
      step.appendChild(btn);
    });
    steps.appendChild(step);
  });

  updateElimTracker();
  if (state.wizard.complete) showWizResult();
}

function updateElimTracker() {
  const tracker = document.getElementById('elim-tracker');
  tracker.textContent = '';
  const { eliminated, scores } = computeWizardScores();

  const meta = { bmad: ['BMAD','var(--red)'], gsd: ['GSD','var(--amber)'], superpowers: ['Superpowers','var(--green)'], native: ['Anthropic Native','var(--cyan)'] };
  Object.entries(meta).forEach(([fw, [name, color]]) => {
    const row = document.createElement('div');
    row.className = 'elim-row' + (eliminated[fw] ? ' eliminated' : '');
    const icon = document.createElement('span');
    icon.className = 'elim-icon';
    if (eliminated[fw]) {
      icon.textContent = '\u2717';
      row.appendChild(icon);
      row.appendChild(document.createTextNode(' ' + name + ' '));
      const reason = document.createElement('span');
      reason.style.cssText = 'font-size:11px;color:var(--text-dim);margin-left:8px';
      reason.textContent = '(Q' + eliminated[fw][0].q + ': ' + eliminated[fw][0].reason + ')';
      row.appendChild(reason);
    } else {
      icon.style.color = color;
      icon.textContent = '\u25A0';
      row.appendChild(icon);
      row.appendChild(document.createTextNode(' ' + name + ' '));
      if (Object.keys(state.wizard.answers).length > 0) {
        const sc = document.createElement('span');
        sc.style.cssText = 'font-size:11px;color:var(--text-dim);margin-left:8px';
        sc.textContent = 'Score: ' + scores[fw];
        row.appendChild(sc);
      }
    }
    tracker.appendChild(row);
  });
}

function showWizResult() {
  const result = document.getElementById('wiz-result');
  result.classList.add('active');

  const { eliminated, sorted } = computeWizardScores();
  if (!sorted.length) return;
  const primary = sorted[0];
  const secondary = sorted[1];

  const rec = document.getElementById('wiz-rec');
  rec.textContent = '';

  const title = document.createElement('div');
  title.style.cssText = 'font-size:18px;font-weight:600;margin-bottom:12px';
  title.style.color = FW_COLORS[primary[0]];
  title.textContent = FW_NAMES[primary[0]];
  rec.appendChild(title);

  if (secondary && secondary[1] > 0) {
    const comp = document.createElement('div');
    comp.style.cssText = 'font-size:13px;color:var(--text-dim);margin-bottom:16px';
    comp.textContent = 'Complementary: ';
    const cs = document.createElement('span');
    cs.style.color = FW_COLORS[secondary[0]];
    cs.textContent = FW_NAMES[secondary[0]];
    comp.appendChild(cs);
    rec.appendChild(comp);
  }

  // Answers summary
  const ansSection = document.createElement('div');
  ansSection.style.marginBottom = '16px';
  const ansH = document.createElement('h4');
  ansH.style.cssText = 'font-size:12px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px';
  ansH.textContent = 'Your answers';
  ansSection.appendChild(ansH);
  const ansBody = document.createElement('div');
  ansBody.style.fontSize = '13px';
  Object.entries(state.wizard.answers).forEach(([i, key]) => {
    const opt = wizardQuestions[i].options.find(o => o.key === key);
    if (!opt) return;
    const line = document.createElement('div');
    const b = document.createElement('strong');
    b.textContent = 'Q' + (Number(i) + 1) + ': ';
    line.appendChild(b);
    line.appendChild(document.createTextNode(opt.label));
    ansBody.appendChild(line);
  });
  ansSection.appendChild(ansBody);
  rec.appendChild(ansSection);

  // Eliminations
  if (Object.keys(eliminated).length) {
    const eSection = document.createElement('div');
    eSection.style.marginBottom = '16px';
    const eH = document.createElement('h4');
    eH.style.cssText = 'font-size:12px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px';
    eH.textContent = 'Eliminations';
    eSection.appendChild(eH);
    const eBody = document.createElement('div');
    eBody.style.fontSize = '13px';
    Object.entries(eliminated).forEach(([fw, reasons]) => {
      const line = document.createElement('div');
      const fwSpan = document.createElement('span');
      fwSpan.style.color = FW_COLORS[fw];
      fwSpan.textContent = FW_NAMES[fw];
      line.appendChild(fwSpan);
      line.appendChild(document.createTextNode(' eliminated at Q' + reasons[0].q + ': ' + reasons[0].reason));
      eBody.appendChild(line);
    });
    eSection.appendChild(eBody);
    rec.appendChild(eSection);
  }

  // Tradeoffs
  const tradeoffs = [];
  if (primary[0] === 'native') { tradeoffs.push('No pre-built domain agents -- you build your own'); tradeoffs.push('No methodology enforcement -- TDD is encouraged, not mandated'); }
  if (primary[0] === 'superpowers') { tradeoffs.push('Skills are composable but opinionated'); tradeoffs.push('Multi-provider requires workarounds'); }
  if (primary[0] === 'gsd') { tradeoffs.push('Higher abstraction tax -- more layers'); tradeoffs.push('Update lag when new models release'); }
  if (primary[0] === 'bmad') { tradeoffs.push('Heavy setup (12+ personas)'); tradeoffs.push('Contradicts Anthropic findings on micro vs high-level planning'); }
  if (tradeoffs.length) {
    const tSection = document.createElement('div');
    const tH = document.createElement('h4');
    tH.style.cssText = 'font-size:12px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px';
    tH.textContent = 'Tradeoffs accepted';
    tSection.appendChild(tH);
    const tBody = document.createElement('div');
    tBody.style.fontSize = '13px';
    tradeoffs.forEach(t => { const d = document.createElement('div'); d.textContent = '\u2022 ' + t; tBody.appendChild(d); });
    tSection.appendChild(tBody);
    rec.appendChild(tSection);
  }
}

// ===== OBSOLESCENCE RENDERER =====
function renderObsolescence() {
  const slider = document.getElementById('obs-slider');
  state.obsolescence = Number(slider.value);
  const future = state.obsolescence / 100;
  const tbody = document.getElementById('obs-tbody');
  tbody.textContent = '';

  obsComponents.forEach(c => {
    let value, risk;
    if (c.cat === 'workaround') { value = Math.max(0, c.baseValue - future * c.baseValue * 1.2); risk = Math.min(100, c.baseRisk + future * 10); }
    else if (c.cat === 'orchestration') { value = Math.max(20, c.baseValue - future * 15); risk = Math.min(40, c.baseRisk + future * 10); }
    else { value = Math.min(100, c.baseValue + future * 5); risk = Math.max(0, c.baseRisk - future * 3); }

    const catColor = { discipline:'green', orchestration:'blue', workaround:'red' }[c.cat];
    const catLabel = { discipline:'Engineering discipline', orchestration:'Orchestration pattern', workaround:'Model workaround' }[c.cat];
    const valColor = value > 60 ? 'green' : value > 30 ? 'amber' : 'red';
    const riskColor = risk > 60 ? 'red' : risk > 30 ? 'amber' : 'green';

    const tr = document.createElement('tr');
    const tdName = document.createElement('td');
    tdName.style.fontWeight = '500';
    tdName.textContent = c.name;
    tr.appendChild(tdName);

    const tdSrc = document.createElement('td');
    tdSrc.style.cssText = 'font-size:12px;color:var(--text-dim)';
    tdSrc.textContent = c.source;
    tr.appendChild(tdSrc);

    const tdCat = document.createElement('td');
    const catBadge = document.createElement('span');
    catBadge.className = 'badge badge-' + catColor;
    catBadge.textContent = catLabel;
    tdCat.appendChild(catBadge);
    tr.appendChild(tdCat);

    [['value', value, valColor], ['risk', risk, riskColor]].forEach(([, val, clr]) => {
      const td = document.createElement('td');
      const wrap = document.createElement('div');
      wrap.style.cssText = 'display:flex;align-items:center;gap:8px';
      const bar = document.createElement('div');
      bar.style.cssText = 'width:60px;height:6px;background:var(--border);border-radius:3px;overflow:hidden';
      const fill = document.createElement('div');
      fill.style.cssText = 'height:100%;border-radius:3px;transition:width 0.3s';
      fill.style.width = Math.round(val) + '%';
      fill.style.background = 'var(--' + clr + ')';
      bar.appendChild(fill);
      wrap.appendChild(bar);
      const num = document.createElement('span');
      num.className = 'mono';
      num.style.fontSize = '11px';
      num.textContent = Math.round(val) + '%';
      wrap.appendChild(num);
      td.appendChild(wrap);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
  updatePrompt();
}

// ===== HYBRID RENDERER =====
function renderHybrid() {
  const container = document.getElementById('hyb-slots');
  container.textContent = '';

  hybridSlots.forEach(slot => {
    const div = document.createElement('div');
    div.className = 'slot';
    const h4 = document.createElement('h4');
    h4.textContent = slot.label;
    div.appendChild(h4);
    const opts = document.createElement('div');
    opts.className = 'slot-options';
    slot.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'slot-opt' + (state.hybrid[slot.key] === opt.id ? ' selected' : '');
      btn.textContent = opt.label;
      btn.title = opt.desc;
      btn.addEventListener('click', () => {
        state.hybrid[slot.key] = state.hybrid[slot.key] === opt.id ? null : opt.id;
        clearHybPresets();
        renderHybrid();
        updatePrompt();
      });
      opts.appendChild(btn);
    });
    div.appendChild(opts);
    container.appendChild(div);
  });

  // Conflicts
  const conflictEl = document.getElementById('hyb-conflicts');
  const active = hybridConflicts.filter(c => c.test(state.hybrid));
  if (active.length) {
    conflictEl.textContent = active[0].msg;
    conflictEl.classList.add('visible');
  } else {
    conflictEl.classList.remove('visible');
  }

  // Summary
  const summary = document.getElementById('hyb-summary');
  summary.textContent = '';
  const selections = hybridSlots.map(s => {
    if (!state.hybrid[s.key]) return null;
    const opt = s.options.find(o => o.id === state.hybrid[s.key]);
    if (!opt) return null;
    return { label: s.label, choice: opt.label, source: opt.source };
  }).filter(Boolean);

  if (selections.length) {
    selections.forEach(sel => {
      const line = document.createElement('div');
      const b = document.createElement('strong');
      b.textContent = sel.label + ': ';
      line.appendChild(b);
      line.appendChild(document.createTextNode(sel.choice + ' '));
      const src = document.createElement('span');
      src.style.color = 'var(--text-dim)';
      src.textContent = '(' + sel.source + ')';
      line.appendChild(src);
      summary.appendChild(line);
    });
  } else {
    summary.textContent = 'Select components above to build your hybrid stack.';
    summary.style.color = 'var(--text-dim)';
  }
}

function clearHybPresets() {
  document.querySelectorAll('#hyb-presets .preset-btn').forEach(b => b.classList.remove('active'));
}

function initHybPresets() {
  const presets = document.getElementById('hyb-presets');
  [['Recommended (Claude-only)','recommended'],['Max Structure','maxStructure'],['Lightweight','lightweight'],['Clear All','clear']].forEach(([label,key]) => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = label;
    btn.addEventListener('click', () => {
      document.querySelectorAll('#hyb-presets .preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (key === 'recommended') state.hybrid = { planner:'native-plan', generator:'native-gen', evaluator:'native-eval', methodology:'sp-method', orchestration:'native-orch' };
      else if (key === 'maxStructure') state.hybrid = { planner:'bmad-plan', generator:'gsd-gen', evaluator:'sp-eval', methodology:'sp-method', orchestration:'gsd-orch' };
      else if (key === 'lightweight') state.hybrid = { planner:'sp-plan', generator:'native-gen', evaluator:'sp-eval', methodology:'none-method', orchestration:'none-orch' };
      else state.hybrid = { planner:null, generator:null, evaluator:null, methodology:null, orchestration:null };
      renderHybrid();
      updatePrompt();
    });
    presets.appendChild(btn);
  });
}

// ===== PROMPT =====
function updatePrompt() {
  const parts = [];

  if (state.activeTab === 'ablation') {
    const removed = ablationComponents.filter(c => !state.ablation[c.key]);
    const kept = ablationComponents.filter(c => state.ablation[c.key]);
    if (removed.length > 0 && removed.length < ablationComponents.length) {
      parts.push('Based on ablation analysis, I want a harness that keeps ' + kept.map(c=>c.name.toLowerCase()).join(', ') + ' but drops ' + removed.map(c=>c.name.toLowerCase()).join(', ') + '.');
      const risky = removed.filter(c => c.opusImpact === 'red');
      if (risky.length) parts.push('Note: removing ' + risky.map(c=>c.name.toLowerCase()).join(' and ') + ' has significant impact even on Opus 4.6.');
    } else if (removed.length === 0) {
      parts.push('Evaluating the full harness configuration. All components active.');
    } else {
      parts.push('Testing with bare generator only -- no scaffolding. This works for strong models on well-defined tasks.');
    }
  }

  if (state.activeTab === 'wizard' && state.wizard.complete) {
    const answers = Object.entries(state.wizard.answers).map(([i, key]) => {
      const opt = wizardQuestions[i].options.find(o => o.key === key);
      return opt ? opt.label.toLowerCase() : key;
    });
    parts.push('Decision context: ' + answers.join('; ') + '.');
    const { sorted } = computeWizardScores();
    if (sorted.length) {
      parts.push('Primary recommendation: ' + FW_NAMES[sorted[0][0]] + '. Help me implement this approach.');
    }
  }

  if (state.activeTab === 'obsolescence') {
    const level = state.obsolescence > 70 ? 'far-future' : state.obsolescence > 40 ? 'near-future' : 'current';
    parts.push('At ' + level + ' model capability (' + state.obsolescence + '%), which harness components remain valuable and which are obsolete? Focus on the boundary between engineering discipline and model limitation workarounds.');
  }

  if (state.activeTab === 'hybrid') {
    const selections = hybridSlots.map(s => {
      if (!state.hybrid[s.key]) return null;
      const opt = s.options.find(o => o.id === state.hybrid[s.key]);
      if (!opt) return null;
      return s.label + ': ' + opt.label;
    }).filter(Boolean);
    if (selections.length) {
      parts.push('My hybrid agent harness:\n' + selections.join('\n'));
      parts.push('\nHelp me implement this stack. What are the integration points and potential issues?');
    }
  }

  if (state.activeTab === 'dilution') {
    parts.push('I want to understand the tradeoffs of multi-provider vs Claude-only agent frameworks. What specific capabilities do I lose by going provider-agnostic, and how does update lag affect framework value?');
  }

  if (state.activeTab === 'native') {
    parts.push('Compare what Claude Code provides natively vs what third-party agent frameworks add. Where are the genuine gaps that justify adopting a framework?');
  }

  if (state.activeTab === 'architecture') {
    parts.push('Compare the architectures of BMAD, GSD, Superpowers, and Anthropic Native harness designs. Focus on communication patterns (file-based vs agent teams) and how agent count affects debuggability.');
  }

  document.getElementById('prompt-text').textContent = parts.join('\n\n');
}

function initPrompt() {
  const promptToggle = document.getElementById('prompt-toggle');
  function togglePromptPanel(e) {
    if (e.target.closest('.copy-btn')) return;
    state.promptCollapsed = !state.promptCollapsed;
    document.getElementById('prompt-body').style.display = state.promptCollapsed ? 'none' : 'block';
    document.getElementById('prompt-chevron').classList.toggle('up', state.promptCollapsed);
    promptToggle.setAttribute('aria-expanded', !state.promptCollapsed);
  }
  promptToggle.addEventListener('click', togglePromptPanel);
  promptToggle.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); togglePromptPanel(e); }
  });
  document.getElementById('copy-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    const text = document.getElementById('prompt-text').textContent;
    const btn = document.getElementById('copy-btn');
    if (!navigator.clipboard) {
      btn.textContent = 'Failed';
      setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
      return;
    }
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
    }).catch(() => {
      btn.textContent = 'Failed';
      setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
    });
  });
}

// ===== INIT =====
function init() {
  buildAllSections();
  initTabs();
  initAblPresets();
  renderAblation();
  renderArchDiagrams();
  renderWizard();
  initWizReset();
  document.getElementById('obs-slider').addEventListener('input', renderObsolescence);
  renderObsolescence();
  renderGaps();
  initHybPresets();
  renderHybrid();
  initPrompt();
  updatePrompt();
}

try {
  init();
} catch (e) {
  const err = e instanceof Error ? e : new Error(String(e));
  document.body.style.cssText = 'background:#0c0f14;color:#ef4444;padding:24px;font-family:monospace';
  document.body.textContent = '';
  const h = document.createElement('h2');
  h.textContent = 'Failed to initialize';
  const pre = document.createElement('pre');
  pre.textContent = err.message + '\n' + err.stack;
  document.body.appendChild(h);
  document.body.appendChild(pre);
  console.error('Init failed:', err);
}
</script>
